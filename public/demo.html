<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customizer Widget Demo - Unified Approach</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f5f5f5;
      }
      .demo-section {
        background: white;
        padding: 0;
        margin: 0;
        width: 100%;
      }
      .widget-demo {
        border: none;
        padding: 0;
        margin: 0;
        width: 100%;
      }
      .info {
        background: #e3f2fd;
        padding: 12px;
        border-radius: 4px;
        margin-bottom: 16px;
      }
    </style>
  </head>
  <body>
    <div class="info">
      <strong>Unified Approach:</strong> Widget mode is primary, SPA mode is
      fallback. All routing uses hash mode for compatibility.
    </div>

    <div class="demo-section">
      <div class="widget-demo">
        <customizer-widget
          title="Custom Widget Demo"
          color="#6bffff"
          theme="light"
          mode="default"
          show-navigation="true"
          date="2024-01-15"
          end="Widget session ended"
        ></customizer-widget>
      </div>
    </div>

    <!-- Load the widget script -->
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
